<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Layer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font: 14px/1.5 system-ui, sans-serif;
      background: #111827;
      color: #f9fafb;
      padding: 16px;
    }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .badge {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 9999px;
      font-weight: 500;
    }
    .badge.online  { background: #065f46; color: #6ee7b7; }
    .badge.offline { background: #7f1d1d; color: #fca5a5; }
    section { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 7px 10px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #f9fafb;
      font-size: 13px;
    }
    input:focus { outline: none; border-color: #6366f1; }
    button.primary {
      width: 100%;
      padding: 8px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }
    button.primary:hover { background: #4338ca; }
    .row { display: flex; gap: 8px; align-items: center; }
    .hint { font-size: 11px; color: #6b7280; margin-top: 4px; }
    #status-row { margin-bottom: 14px; }
    a { color: #818cf8; text-decoration: none; font-size: 12px; }
    a:hover { text-decoration: underline; }
    hr { border: none; border-top: 1px solid #1f2937; margin: 12px 0; }
    .savings { background: #064e3b; border-radius: 8px; padding: 10px 12px; }
    .savings .amount { font-size: 20px; font-weight: 700; color: #6ee7b7; }
    .savings .label  { font-size: 11px; color: #a7f3d0; }
  </style>
</head>
<body>
  <h1>
    Memory Layer
    <span id="status-badge" class="badge offline">offline</span>
  </h1>

  <div id="savings-block" class="savings" style="display:none; margin-bottom:14px;">
    <div class="amount" id="savings-amount">$0.00</div>
    <div class="label">saved this month</div>
  </div>

  <section id="key-section">
    <label for="api-key">API Key</label>
    <input id="api-key" type="password" placeholder="Enter your Memory Layer API key" autocomplete="off" />
    <button class="primary" id="save-key-btn">Save &amp; connect</button>
    <p class="hint">Your key is stored locally in this browser only.</p>
  </section>

  <section>
    <label for="project-id">Active project</label>
    <input id="project-id" type="text" placeholder="project-id (optional)" />
    <button class="primary" id="save-project-btn">Set project</button>
  </section>

  <hr />
  <a href="http://localhost:8000/dashboard" target="_blank">Open dashboard ↗</a>

  <script src="popup.js"></script>
</body>
</html>
